<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción Carrera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitulo {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            margin-right: 10px;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .btn-organizador {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
        }

        .btn-excel {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }

        .btn-cerrar {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
        }

        .tabla-inscritos {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #667eea;
            color: white;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .contador {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

        .panel-organizador {
            display: none;
        }

        .panel-organizador.activo {
            display: block;
        }

        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .login-box input {
            margin: 15px 0;
        }

        .aviso {
            color: red;
            margin-top: 10px;
            display: none;
        }

        /* Botón oculto */
        .oculto {
            display: none;
        }

        /* Indicador de sesión activa */
        .sesion-activa {
            background: #28a745;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Formulario para participantes (siempre visible) -->
        <div class="card">
            <h1>🏃 Inscripción a la Carrera</h1>
            <div class="subtitulo">Completa el formulario para participar</div>

            <!-- Indicador de sesión organizador activa -->
            <div id="indicadorSesion" style="text-align: center; display: none;">
                <span class="sesion-activa">👑 Modo Organizador activo</span>
            </div>

            <form id="formInscripcion">
                <div class="form-group">
                    <label>Nombre completo:</label>
                    <input type="text" id="nombre" required placeholder="Ej: Juan Pérez">
                </div>

                <div class="form-group">
                    <label>Edad:</label>
                    <input type="number" id="edad" required placeholder="Ej: 25" min="1" max="120">
                </div>

                <div class="form-group">
                    <label>Género:</label>
                    <select id="genero" required>
                        <option value="">Seleccione...</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Femenino">Femenino</option>
                        <option value="Otro">Otro</option>
                        <option value="Prefiero no decir">Prefiero no decir</option>
                    </select>
                </div>

                <button type="submit">✅ Guardar Inscripción</button>
                <button type="button" id="btnModoOrganizador" class="btn-organizador">🔐 Acceso Organizadores</button>
            </form>
        </div>

        <!-- Panel de organizador (oculto por defecto) -->
        <div id="panelOrganizador" class="panel-organizador">
            <div class="card">
                <h2>📋 Panel de Organizador</h2>
                <div class="contador" id="contador">Total inscritos: 0</div>
                
                <button type="button" class="btn-excel" id="btnExcel">📊 Exportar a Excel</button>
                <button type="button" id="btnVaciarTodo" class="btn-organizador">⚠️ Vaciar todos los inscritos</button>
                <button type="button" id="btnCerrarSesion" class="btn-cerrar">🚪 Cerrar sesión</button>
                
                <div class="tabla-inscritos">
                    <table id="tablaInscritos">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Nombre</th>
                                <th>Edad</th>
                                <th>Género</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla">
                            <tr>
                                <td colspan="4" style="text-align: center;">No hay inscritos aún</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de login (aparece al hacer clic en "Acceso Organizadores") -->
    <div id="loginModal" class="login-overlay" style="display: none;">
        <div class="login-box">
            <h2>🔐 Acceso Organizadores</h2>
            <p>Ingresa la contraseña para acceder al panel</p>
            <input type="password" id="passwordOrganizador" placeholder="Contraseña">
            <button id="btnLogin">Ingresar</button>
            <button id="btnCancelarLogin">Cancelar</button>
            <div id="errorLogin" class="aviso">❌ Contraseña incorrecta</div>
        </div>
    </div>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script>
        // ========== CONFIGURACIÓN ==========
        // Cambia esta contraseña por la que quieras usar
        const CONTRASENA_ORGANIZADOR = "carrera2024";
        
        const STORAGE_KEY = 'inscritosCarrera';
        let inscritos = [];
        let modoOrganizador = false;

        // ========== FUNCIONES PRINCIPALES ==========
        function cargarDatos() {
            const guardados = localStorage.getItem(STORAGE_KEY);
            if (guardados) {
                inscritos = JSON.parse(guardados);
            } else {
                inscritos = [];
            }
            if (modoOrganizador) {
                actualizarTabla();
            }
        }

        function guardarEnLocalStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(inscritos));
        }

        function agregarInscrito(nombre, edad, genero) {
            const nuevoInscrito = {
                id: Date.now(),
                nombre: nombre.trim(),
                edad: parseInt(edad),
                genero: genero,
                fecha: new Date().toLocaleString()
            };
            inscritos.push(nuevoInscrito);
            guardarEnLocalStorage();
            if (modoOrganizador) {
                actualizarTabla();
            }
            return true;
        }

        function vaciarTodos() {
            if (confirm('¿Estás seguro de que quieres eliminar TODOS los inscritos? Esta acción no se puede deshacer.')) {
                inscritos = [];
                guardarEnLocalStorage();
                actualizarTabla();
                alert('Todos los inscritos han sido eliminados');
            }
        }

        function actualizarTabla() {
            const tbody = document.getElementById('cuerpoTabla');
            const contadorSpan = document.getElementById('contador');
            
            contadorSpan.textContent = `Total inscritos: ${inscritos.length}`;
            tbody.innerHTML = '';
            
            if (inscritos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">No hay inscritos aún</td></tr>';
                return;
            }
            
            inscritos.forEach((inscrito, index) => {
                const fila = tbody.insertRow();
                fila.insertCell(0).textContent = index + 1;
                fila.insertCell(1).textContent = inscrito.nombre;
                fila.insertCell(2).textContent = inscrito.edad;
                fila.insertCell(3).textContent = inscrito.genero;
            });
        }

        function exportarAExcel() {
            if (inscritos.length === 0) {
                alert('No hay inscritos para exportar');
                return;
            }
            
            const datosExcel = [
                ['#', 'Nombre', 'Edad', 'Género', 'Fecha de inscripción']
            ];
            
            inscritos.forEach((inscrito, index) => {
                datosExcel.push([
                    index + 1,
                    inscrito.nombre,
                    inscrito.edad,
                    inscrito.genero,
                    inscrito.fecha
                ]);
            });
            
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(datosExcel);
            ws['!cols'] = [{wch:5}, {wch:30}, {wch:8}, {wch:12}, {wch:20}];
            XLSX.utils.book_append_sheet(wb, ws, 'Inscritos_Carrera');
            XLSX.writeFile(wb, `inscritos_carrera_${new Date().toISOString().split('T')[0]}.xlsx`);
            alert(`Excel generado con ${inscritos.length} inscritos`);
        }

        // ========== MODOS ==========
        function mostrarPanelOrganizador() {
            modoOrganizador = true;
            
            // Ocultar el botón de "Acceso Organizadores"
            document.getElementById('btnModoOrganizador').classList.add('oculto');
            
            // Mostrar indicador de sesión activa
            document.getElementById('indicadorSesion').style.display = 'block';
            
            // Mostrar el panel
            document.getElementById('panelOrganizador').classList.add('activo');
            
            // Actualizar la tabla
            actualizarTabla();
        }

        function ocultarPanelOrganizador() {
            modoOrganizador = false;
            document.getElementById('panelOrganizador').classList.remove('activo');
        }

        function mostrarLogin() {
            document.getElementById('loginModal').style.display = 'flex';
            document.getElementById('passwordOrganizador').value = '';
            document.getElementById('errorLogin').style.display = 'none';
        }

        function cerrarLogin() {
            document.getElementById('loginModal').style.display = 'none';
        }

        function intentarLogin() {
            const password = document.getElementById('passwordOrganizador').value;
            if (password === CONTRASENA_ORGANIZADOR) {
                cerrarLogin();
                mostrarPanelOrganizador();
            } else {
                document.getElementById('errorLogin').style.display = 'block';
            }
        }

        function cerrarSesion() {
            modoOrganizador = false;
            ocultarPanelOrganizador();
            
            // Mostrar nuevamente el botón de "Acceso Organizadores"
            document.getElementById('btnModoOrganizador').classList.remove('oculto');
            
            // Ocultar indicador de sesión activa
            document.getElementById('indicadorSesion').style.display = 'none';
            
            alert('Has cerrado sesión como organizador');
        }

        // ========== EVENTOS ==========
        document.getElementById('formInscripcion').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nombre = document.getElementById('nombre').value;
            const edad = document.getElementById('edad').value;
            const genero = document.getElementById('genero').value;
            
            if (!nombre) {
                alert('Por favor, ingresa el nombre');
                return;
            }
            if (!edad || edad < 1 || edad > 120) {
                alert('Por favor, ingresa una edad válida (1-120)');
                return;
            }
            if (!genero) {
                alert('Por favor, selecciona un género');
                return;
            }
            
            agregarInscrito(nombre, edad, genero);
            document.getElementById('formInscripcion').reset();
            alert(`¡${nombre} se ha inscrito correctamente!`);
        });
        
        document.getElementById('btnModoOrganizador').addEventListener('click', mostrarLogin);
        document.getElementById('btnLogin').addEventListener('click', intentarLogin);
        document.getElementById('btnCancelarLogin').addEventListener('click', cerrarLogin);
        document.getElementById('btnCerrarSesion').addEventListener('click', cerrarSesion);
        document.getElementById('btnExcel').addEventListener('click', exportarAExcel);
        document.getElementById('btnVaciarTodo').addEventListener('click', vaciarTodos);
        
        // Cerrar modal si hacen clic fuera de él
        document.getElementById('loginModal').addEventListener('click', function(e) {
            if (e.target === this) {
                cerrarLogin();
            }
        });
        
        cargarDatos();
    </script>
</body>
</html>
